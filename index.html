<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CS conference deadlines and rankings, with favorite venues and local-time countdowns."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CS Venues" />
    <meta property="og:title" content="CS Venues" />
    <meta
      property="og:description"
      content="CS conference deadlines and rankings, with favorite venues and local-time countdowns."
    />
    <meta property="og:url" content="https://cs-venues.hooniverse.net/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CS Venues" />
    <meta
      name="twitter:description"
      content="CS conference deadlines and rankings, with favorite venues and local-time countdowns."
    />
    <link rel="canonical" href="https://cs-venues.hooniverse.net/" />
    <title>CS Venues</title>
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <!--
      Theme boot: resolve and apply the theme before first paint to avoid a
      flash. This is the single source of truth for initial theme resolution;
      readInitialUiState() in src/url-state.ts reads the result back off
      document.documentElement.dataset. Keep the rule (URL ?theme= wins over the
      system preference) here only.
    -->
    <script>
      (function () {
        var t = new URLSearchParams(location.search).get("theme");
        var explicit = t === "light" || t === "dark";
        var root = document.documentElement;
        root.dataset.theme = explicit
          ? t
          : (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        if (explicit) root.dataset.themeExplicit = "1";
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
